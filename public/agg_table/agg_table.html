<enhanced-paginated-table
  ng-if="rows.length"
  table="table"
  rows="rows"
  columns="formattedColumns"
  per-page="perPage"
  sort="sort"
  show-total="showTotal"
  filter="filter"
  totalFunc="totalFunc">

  <div class="kbnAggTable__controls">
    <small
      i18n-id="visTypeTable.vis.controls.exportButtonLabel"
      i18n-default-message="Export"
    >:</small>&nbsp;&nbsp;
    <a class="small" ng-click="aggTable.exportAsCsv(false)">
      <span
        i18n-id="visTypeTable.vis.controls.rawCSVButtonLabel"
        i18n-default-message="Raw"
       ></span>
       <i aria-hidden="true" class="fa fa-download"></i>
    </a>&nbsp;&nbsp;&nbsp;
    <a class="small" ng-click="aggTable.exportAsCsv(true)">
      <span
        i18n-id="visTypeTable.vis.controls.formattedCSVButtonLabel"
        i18n-default-message="Formatted"
       ></span>
       <i aria-hidden="true" class="fa fa-download"></i>
    </a>
    <paginate-controls></paginate-controls>
  </div>
</enhanced-paginated-table>
